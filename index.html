<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>WhatsApp 官方共存安全扫码通道</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; padding-top: 100px;">

    <h2>🛡️ WhatsApp Cloud API 官方共存接入</h2>
    <p style="color: #666;">请点击下方蓝色官方按钮，登录并扫描弹出的 QR 二维码完成安全绑定。</p>
    <br><br>

    <div id="fb-root"></div>
    <div class="fb-login-button" 
         data-width="" 
         data-size="large" 
         data-button-type="continue_with" 
         data-layout="default" 
         data-auto-logout-link="false" 
         data-use-continue-as="true"
         data-config-id="3158771517648895"
         data-response-type="code">
    </div>

    <script>
          window.fbAsyncInit = function() {
            FB.init({
              appId      : '4048240838642736',
              cookie     : true,
              xfbml      : true,
              version    : 'v20.0'
            });
              
            FB.AppEvents.logPageView();   
          };
        
          // 🔥 核心修正：在 SDK 加载前，强行在内存中拦截并修正 response_type 为 code
          (function(d, s, id){
             var js, fjs = d.getElementsByTagName(s)[0];
             if (d.getElementById(id)) {return;}
             js = d.createElement(s); js.id = id;
             js.src = "https://connect.facebook.net/en_US/sdk.js";
             
             // 强制重写 Meta 的全局登录参数配置
             window.fbAsyncInit = (function(oldInit) {
               return function() {
                 if (oldInit) oldInit();
                 // 锁定底层 OAuth 路由机制，封死默认的 token 模式
                 FB.provide && FB.provide('Login', {
                   getAuthUrl: function(a) {
                     a.response_type = 'code';
                     return this.getAuthUrl.apply(this, arguments);
                   }
                 });
               };
             })(window.fbAsyncInit);
    
             fjs.parentNode.insertBefore(js, fjs);
           }(document, 'script', 'facebook-jssdk'));
    </script>

</body>
</html>
